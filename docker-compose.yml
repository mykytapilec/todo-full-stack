version: '3.9'

services:
  db:
    image: mongo:7
    container_name: todo-full-stack-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: todo-full-stack-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://db:27017/todos
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: todo-full-stack-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data: